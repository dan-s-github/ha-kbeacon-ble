minimum_pre_commit_version: "3.6.0"
default_install_hook_types: [pre-commit, pre-push, commit-msg]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict

  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.2.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]

  - repo: local
    hooks:
      - id: ruff-format
        name: Ruff format
        entry: uv run --group dev ruff format
        language: system
        types_or: [python, pyi]
      - id: ruff-check
        name: Ruff check (fix)
        entry: uv run --group dev ruff check --fix
        language: system
        types_or: [python, pyi]
      - id: pytest
        name: Pytest
        entry: uv run --group dev pytest
        language: system
        types: [python]
        stages: [pre-push]
        pass_filenames: false
      - id: mypy
        name: Mypy
        entry: uv run --group dev mypy custom_components
        language: system
        types: [python]
        stages: [pre-push]
        pass_filenames: false
